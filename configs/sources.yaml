sources:
  - name: "Google Security Blog"
    type: "feed"
    url: "https://security.googleblog.com/feeds/posts/default?alt=rss"
    category: "安全研究/社区"
    enabled: true
    content_trust: "official"
    delivery_trust: "official_feed"
    notes: "Google 官方安全博客。适合通过关键词筛 AI/LLM/生成式AI/agent 安全内容。"

  - name: "GitHub Blog Security"
    type: "feed"
    url: "https://github.blog/security/feed/"
    category: "GitHub/开源生态"
    enabled: true
    content_trust: "official"
    delivery_trust: "official_feed"
    notes: "GitHub 官方安全栏目。适合补充 AI coding security、漏洞、供应链与 agent 安全相关内容。"

  - name: "OpenAI News"
    type: "feed"
    url: "https://openai.com/news/rss.xml"
    category: "国外大厂"
    enabled: true
    content_trust: "official"
    delivery_trust: "official_feed"
    notes: "OpenAI 官方 News RSS。优先关注 safety、preparedness、misuse、policy、security 相关内容。"

  - name: "Hugging Face Blog"
    type: "feed"
    url: "https://huggingface.co/blog/feed.xml"
    category: "Hugging Face/开源生态"
    enabled: true
    content_trust: "official"
    delivery_trust: "official_feed"
    notes: "Hugging Face 官方博客。噪声会比较大，需通过 AI 安全关键词规则过滤。"

  - name: "CNCERT Security Advisories"
    type: "feed"
    url: "https://www.cert.org.cn/publish/main/rss/site_1/rss.xml"
    category: "政府/官方公告"
    enabled: true
    content_trust: "official"
    delivery_trust: "official_feed"
    notes: >
      国家互联网应急中心（CNCERT/CC）官方 RSS。
      覆盖高危漏洞预警、安全公告、AI 系统安全通报等。
      噪声较高（含非 AI 类通报），依赖关键词过滤后取 AI 安全相关条目。

  - name: "arXiv cs.CR"
    type: "feed"
    url: "https://export.arxiv.org/rss/cs.CR"
    category: "学术研究"
    enabled: true
    content_trust: "community"
    delivery_trust: "official_feed"
    notes: >
      arXiv 密码学与安全（cs.CR）每日新论文 RSS。
      覆盖 LLM 安全、对抗攻击、越狱、prompt injection、模型鲁棒性等学术前沿。
      噪声高（含传统密码学/网络安全），依赖 AI 上下文 + 强关键词过滤。

  # ----------------------------
  # 暂停/待接入：html_list 源及候选源
  # ----------------------------
  - name: “Volcengine LLMScan”
    type: “html_list”
    url: “https://www.volcengine.com/product/llm-scan”
    category: “中国厂商”
    enabled: false
    content_trust: “official”
    delivery_trust: “official_page”
    notes: >
      火山引擎大模型安全测评产品页。
      【暂停原因】固定单页 URL，首次推送后 sent_items 永久去重，后续运行不再推送。
      待 html_list 支持”内容变化检测”或改为 API/RSS 接入后重新启用。

  - name: “Ant Group AI Safety News”
    type: “html_list”
    url: “https://www.antgroup.com/news-media/press-releases/1694256546000”
    category: “中国厂商”
    enabled: false
    content_trust: “official”
    delivery_trust: “official_page”
    notes: >
      蚂蚁”蚁天鉴”公开新闻稿（固定单篇文章 URL，非新闻列表页）。
      【暂停原因】URL 固定，首次推送后永久被去重屏蔽，无法作为持续信息流。
      待找到蚂蚁 AI 安全相关 RSS 或新闻列表页后替换。

  - name: "ModelScope Learn"
    type: "html_list"
    url: "https://www.modelscope.cn/learn"
    category: "魔搭/国内生态"
    enabled: false
    content_trust: "official"
    delivery_trust: "official_page"
    notes: >
      魔搭 Learn 内容页。
      【暂停原因】页面为 React SPA，静态 HTTP 抓取拿不到文章链接（html_len 有值但 hrefs_found=0）。
      待改用 ModelScope API（/api/v1/articles）或找到对应 RSS 后重新启用。

  - name: "ModelScope Safety Models"
    type: "html_list"
    url: "https://modelscope.cn/models"
    category: "魔搭/国内生态"
    enabled: false
    content_trust: "official"
    delivery_trust: "official_page"
    notes: "后续可对白名单模型/数据集页面做抓取，如安全模型、治理数据集、内容风险识别模型等。"
